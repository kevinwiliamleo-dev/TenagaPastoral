<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login - Sistem Evaluasi Kinerja</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Tailwind Config -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13a4ec",
                        "primary-hover": "#0f8cc9",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101c22",
                        "text-main": "#0d171b",
                        "text-muted": "#4c809a",
                        "border-color": "#cfdfe7",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display min-h-screen flex flex-col items-center justify-center p-4">
<!-- Background Pattern/Gradient (Subtle) -->
<div class="fixed inset-0 z-0 opacity-40 pointer-events-none bg-[radial-gradient(#cfdfe7_1px,transparent_1px)] [background-size:16px_16px]"></div>
<div class="fixed inset-0 z-0 bg-gradient-to-b from-transparent to-white/50 dark:to-background-dark pointer-events-none"></div>
<!-- Main Card Container -->
<div class="relative z-10 w-full max-w-[420px] bg-white dark:bg-[#1a2c35] rounded-xl shadow-xl border border-gray-100 dark:border-gray-800 overflow-hidden">
<!-- Header Section -->
<div class="flex flex-col items-center pt-10 pb-6 px-8 text-center">
<!-- Icon -->
<div class="h-14 w-14 rounded-full bg-primary/10 flex items-center justify-center mb-5">
<span class="material-symbols-outlined text-primary text-3xl">church</span>
</div>
<!-- Headline -->
<h1 class="text-text-main dark:text-white tracking-tight text-2xl font-bold leading-tight mb-1">
                Sistem Evaluasi Kinerja
            </h1>
<!-- Subtitle -->
<p class="text-text-muted text-sm font-medium">
                Tenaga Pastoral (v2.0)
            </p>
</div>
<!-- Error State (Visible for demo purposes, usually hidden) -->
<div class="px-8 pb-2">
<div class="bg-red-50 dark:bg-red-900/20 border border-red-100 dark:border-red-800/50 rounded-lg p-3 flex gap-3 items-start">
<span class="material-symbols-outlined text-red-500 text-sm mt-0.5">error</span>
<p class="text-red-600 dark:text-red-400 text-sm font-medium leading-tight">
                    Login Gagal. Silakan periksa email dan password Anda.
                </p>
</div>
</div>
<!-- Form Section -->
<form class="px-8 py-6 flex flex-col gap-5">
<!-- Email Input -->
<div class="flex flex-col gap-2">
<label class="text-text-main dark:text-gray-200 text-sm font-semibold" for="email">Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-text-muted text-[20px]">mail</span>
<input class="w-full pl-10 pr-4 py-3 rounded-lg border border-border-color dark:border-gray-700 bg-background-light dark:bg-[#233540] text-text-main dark:text-white placeholder:text-text-muted focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all text-sm font-normal" id="email" name="email" placeholder="nama@gereja.org" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-2">
<div class="flex justify-between items-center">
<label class="text-text-main dark:text-gray-200 text-sm font-semibold" for="password">Password</label>
<a class="text-primary hover:text-primary-hover text-xs font-medium hover:underline" href="#">Lupa Password?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-text-muted text-[20px]">lock</span>
<input class="w-full pl-10 pr-4 py-3 rounded-lg border border-border-color dark:border-gray-700 bg-background-light dark:bg-[#233540] text-text-main dark:text-white placeholder:text-text-muted focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all text-sm font-normal" id="password" name="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Submit Button -->
<button class="mt-2 w-full bg-primary hover:bg-primary-hover text-white font-semibold py-3 px-4 rounded-lg transition-colors shadow-sm shadow-primary/30 flex items-center justify-center gap-2" type="button">
<span>Masuk</span>
<span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</form>
<!-- Footer / Copyright -->
<div class="bg-gray-50 dark:bg-[#15232a] px-8 py-4 border-t border-gray-100 dark:border-gray-800 text-center">
<p class="text-xs text-text-muted">© 2024 Keuskupan Agung. All rights reserved.</p>
</div>
</div>
<!-- Background Image Illustration (Decorative) -->
<!-- Positioned absolutely to not interfere with layout flow but add visual interest -->
<div class="fixed bottom-0 left-0 w-full h-1/3 z-0 pointer-events-none opacity-30 hidden lg:block">
<div class="w-full h-full bg-gradient-to-t from-white to-transparent dark:from-background-dark absolute bottom-0 left-0 z-10"></div>
<div class="w-full h-full bg-cover bg-bottom opacity-20" data-alt="Abstract geometric landscape or church silhouette outline" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuD8WXkahuPHsMuKuuh3ScYJxM5Xh62j6dDC34xvQWHN0eINp9YjZvnD73pz1xasBxJAcys0KghPfqAd4RwwelxJQU70d44o9cNuQb_2-s4wfmqPTdPf-GqCUavCIKC5Dvl2OD6vuyW3NruXxc2eVuZq9x94gfAx_Qu3m6C5bCzXDma-EfGmwnqw13TYiubLIIvCmvCU6LgTadvHN1E9X--N-FbzpTawMI3DxxO1lLhQWD8uQi04t3y_VfB-PSMf8GQUZ0KtsOLkg90");'></div>
</div>
</body></html>
