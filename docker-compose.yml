services:
  # ================================
  # PostgreSQL Database (Lokal)
  # ================================
  postgres:
    image: postgres:15-alpine
    container_name: kpi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: kpi_pastoral
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-KpiPastoral2026!}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d kpi_pastoral"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kpi-network

  # ================================
  # KPI Tenaga Pastoral App
  # ================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kpi-pastoral-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-KpiPastoral2026!}@postgres:5432/kpi_pastoral
      DIRECT_URL: postgresql://postgres:${POSTGRES_PASSWORD:-KpiPastoral2026!}@postgres:5432/kpi_pastoral
      AUTH_SECRET: ${AUTH_SECRET:-SuperSecretKpiPastoral2026RandomString}
      AUTH_URL: http://localhost:3000
      AUTH_TRUST_HOST: "true"
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - kpi-network

volumes:
  postgres_data:
    driver: local

networks:
  kpi-network:
    driver: bridge
